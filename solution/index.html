<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible Website</title>
    <style>
      body {
        font-family: sans-serif;
      }
      nav {
        background-color: #f0f0f0;
        padding: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .right-nav a {
        margin-left: 10px;
      }
      .high-contrast {
        color: #222222;
        background-color: white;
      }
    </style>
  </head>
  <body>
    <nav>
      <h2>Navigation Bar</h2>
      <div class="right-nav">
        <a href="/page1.html">Go to the next page of the site</a>
      </div>
    </nav>

    <main>
      <h1>This is my header</h1>

      <p class="high-contrast">This is my paragraph text</p>

      <img alt="this is a scenic picture of mountains" src="photo.jpeg">
    </main>
  </body>
</html>
