<!DOCTYPE html>
<!-- Missing lang attribute on <html> -->
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inaccessible Website</title>
    <style>
      body {
        font-family: sans-serif;
      }
      nav {
        background-color: #f0f0f0;
        padding: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .right-nav a {
        margin-left: 10px;
      }
      .low-contrast {
        color: #D3D3D3;
        background-color: white;
      }
      .high-contrast {
        color: #222222;
        background-color: white;
      }
    </style>
  </head>
  <body>
    <!-- Missing semantic <nav> and heading structure -->
    <div class="nav-bar">
      <div style="font-size: 24px; font-weight: bold;">Navigation Bar</div>
      <div class="right-nav">
        <!-- Link has unclear purpose -->
        <a href="/page1.html">Click here</a>
      </div>
    </div>

    <!-- Using <div> for headings -->
    <div style="font-size: 32px; font-weight: bold;">This is my header</div>

    <!-- Low contrast text -->
    <div class="low-contrast">This is my paragraph text</div>

    <!-- Image without alt attribute-->
    <img src="photo.jpeg">
    <div>
      <button id="toggleButton" aria-expanded="false" aria-controls="togglePanel">Toggle Description</button>
      <div id="togglePanel" hidden>
        <p>This beautiful landscape photo was captured at 1990, by photographer Alice.</p>
        <p>This content is toggled, but aria-expanded is not updated.</p>
      </div>
    </div>

    <script>
      const toggleButton = document.getElementById('toggleButton');
      const togglePanel = document.getElementById('togglePanel');

      toggleButton.addEventListener('click', function () {
        // Toggle the visibility of the panel
        if (togglePanel.hidden) {
          togglePanel.hidden = false;
        } else {
          togglePanel.hidden = true;
        }
        // ERROR: The aria-expanded attribute remains unchanged!
      });
    </script>
  </body>
</html>
