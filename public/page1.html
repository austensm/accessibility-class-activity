<!DOCTYPE html>
<!-- Missing lang attribute on <html> -->
<html>
<head>
  <meta charset="UTF-8" />
  <title>Inaccessible Website</title>
  <style>
    body {
      font-family: sans-serif;
    }
    nav {
      background-color: #f0f0f0;
      padding: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .right-nav a {
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <div>
    <h2>Navigation Bar</h2>
    <div class="right-nav">
      <!-- Undescriptive link -->
      <a href="/index.html">Click here</a>
    </div>
  </div>

  <!-- No label for the form -->
  <form onsubmit="handleSubmit(event)">
    <input id="textInput" placeholder="Type something..." /><br /><br />
    <button type="submit">Submit</button>
    <p id="error" role="alert" aria-live="assertive"></p>
  </form>

  <p id="result"></p>

  <script>
    function handleSubmit(event) {
      event.preventDefault();
      const input = document.getElementById('textInput').value.trim();
      const error = document.getElementById('error');
      const result = document.getElementById('result');

      if (input === '') {
        // Fix error message here to make more descriptive
        error.textContent = 'ERROR';
        result.textContent = '';
      } else {
        error.textContent = '';
        result.textContent = 'You entered: ' + input;
      }
    }
  </script>

</body>
</html>
